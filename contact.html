<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #e6e6fa, #d8bfd8);
        }

        .navbar {
            background: purple;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            background: white;
            width: 300px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: purple;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</div>

<div class="container">
    <h2>Contact Me</h2>

    <form>
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Your Message"></textarea><br>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
